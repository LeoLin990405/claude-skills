name: Feature Request
description: Suggest a new skill, template, or improvement
labels: ["enhancement"]
body:
  - type: dropdown
    id: toolkit
    attributes:
      label: Toolkit
      description: Which toolkit does this relate to?
      options:
        - PM Toolkit (lenny)
        - Design Toolkit (design)
        - Document Toolkit (office)
        - R Analytics Toolkit (r-analytics)
        - Knowledge Toolkit (obsidian)
        - Repository Toolkit (github-repo-design)
        - Developer Toolkit (utility)
        - Coordination Toolkit (ccb)
        - New Toolkit
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the skill, template, or improvement you would like.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative approaches you have considered.
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other information or examples.
